version: "2.2"

services:
  ipfs:
    image: ipfs/kubo:latest
    container_name: ipfs
    ports:
      - "4001:4001"
      - "5001:5001"
      - "8080:8080"
    volumes:
      - ipfs_staging:/export
      - ipfs_data:/data/ipfs

  hardhat:
    image: node:18-bullseye
    container_name: hardhat
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "8545:8545"
    command: >
      bash -lc "
      npm ci || npm install &&
      npx hardhat compile &&
      npx hardhat node --hostname 0.0.0.0
      "  

volumes:
  ipfs_staging:
  ipfs_data:
